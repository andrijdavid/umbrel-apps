server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. Resolving the node via a variable (below) means
    # nginx starts even if the node container isn't up yet, and re-resolves it
    # per request, so it survives node restarts (new container IP).
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # JSON-RPC proxy to the Allfeat node. Same origin as the status page, so
    # requests stay behind Umbrel's app_proxy authentication.
    location /rpc {
        set $allfeat_node allfeat_node_1;
        proxy_pass http://$allfeat_node:9944/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
