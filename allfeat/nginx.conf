server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # JSON-RPC (and websocket) proxy to the Allfeat node. Same origin as the
    # status page, so requests stay behind Umbrel's app_proxy authentication.
    location /rpc {
        proxy_pass http://allfeat_node_1:9944/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
