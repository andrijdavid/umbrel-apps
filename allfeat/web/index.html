<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Allfeat</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #151515;
        --panel: #1c1c1c;
        --border: #2c2c2c;
        --text: #ede8d5;
        --cream: #fffbeb;
        --muted: #8f8b7e;
        --accent: #ff4a5f; /* Allfeat coral */
        --ok: #2bd47d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        padding: 40px 16px;
      }
      .wrap { width: 100%; max-width: 640px; }
      .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
      .brand svg { width: 38px; height: 38px; color: var(--accent); }
      h1 { font-size: 24px; margin: 0; letter-spacing: -0.01em; color: var(--cream); }
      .sub { color: var(--muted); font-size: 14px; margin: 0 0 24px 52px; }
      .status { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 24px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px rgba(255,74,95,.15); }
      .dot.ok { background: var(--ok); box-shadow: 0 0 0 3px rgba(43,212,125,.15); }
      .dot.err { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.15); }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
      .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
      .card .value { font-size: 20px; margin-top: 6px; word-break: break-all; color: var(--cream); }
      .full { grid-column: 1 / -1; }
      .bar { height: 8px; background: #2c2c2c; border-radius: 999px; overflow: hidden; margin-top: 12px; }
      .bar > span { display: block; height: 100%; width: 0; background: var(--accent); transition: width .4s ease; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; color: var(--text); }
      .foot { margin-top: 24px; color: var(--muted); font-size: 12px; text-align: center; }
      .foot a { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Allfeat logo">
          <path fill="currentColor" d="M42.495 20.206a4.986 4.986 0 1 0-9.211-3.813 4.986 4.986 0 0 0 9.21 3.813ZM10 23.28a4.985 4.985 0 1 0 .001-9.97 4.985 4.985 0 0 0 0 9.97ZM23.87 47.458a4.985 4.985 0 1 0 .002-9.97 4.985 4.985 0 0 0-.001 9.97Z"/>
          <path fill="currentColor" d="M44.286 29.73c-1.533-.888-3.246-1.139-4.872-.895-1.663.244-3.61 1.48-5.796.217-1.757-1.018-2.02-2.985-2.481-4.497a7.338 7.338 0 0 0-2.114-3.472c-1.052-1.072-2.367-2.237-2.367-4.09 0-2.524 2.043-3.592 3.088-4.907 1.019-1.296 1.653-2.905 1.653-4.681A7.405 7.405 0 0 0 23.991 0a7.405 7.405 0 0 0-7.406 7.405c0 1.756.564 3.288 1.636 4.637.932 1.175 3.116 2.731 3.116 4.941 0 2.07-1.837 3.289-3.082 4.881a8.4 8.4 0 0 0-1.139 1.907c-.678 1.549-.678 4.036-2.741 5.221-2.184 1.262-4.134.027-5.797-.217-1.626-.244-3.342.01-4.872.895C.16 31.73-1.052 36.254.995 39.796a7.402 7.402 0 0 0 10.12 2.704c1.523-.878 2.568-2.13 3.203-3.733.547-1.392.808-4.063 2.725-5.168 1.539-.888 3.218-.287 4.941.077.054.017.104.027.157.043.017 0 .034.01.044.01l.243.054c.06.01.12.027.184.033.027 0 .054.01.07.01.428.077.872.12 1.323.12h.19c.07 0 .14 0 .217-.01.21-.01.427-.026.634-.053 2.054-.254 4.08-1.305 5.917-.244 1.913 1.105 2.177 3.776 2.725 5.168.634 1.603 1.68 2.855 3.202 3.733a7.42 7.42 0 0 0 10.12-2.704c2.044-3.532.819-8.066-2.724-10.11v.004Z"/>
        </svg>
        <h1>Allfeat</h1>
      </div>
      <p class="sub" id="chainline">Connecting…</p>

      <div class="status">
        <span class="dot" id="dot"></span>
        <span id="statustext">Contacting node…</span>
      </div>

      <div class="grid">
        <div class="card full">
          <div class="label">Sync</div>
          <div class="value" id="syncval">—</div>
          <div class="bar"><span id="syncbar"></span></div>
        </div>
        <div class="card">
          <div class="label">Peers</div>
          <div class="value" id="peers">—</div>
        </div>
        <div class="card">
          <div class="label">Best block</div>
          <div class="value" id="best">—</div>
        </div>
        <div class="card full">
          <div class="label">Node identity</div>
          <div class="value"><code id="peerid">—</code></div>
        </div>
        <div class="card full">
          <div class="label">Version</div>
          <div class="value" id="version">—</div>
        </div>
      </div>

      <p class="foot">Allfeat · music-native blockchain · <a href="https://allfeat.com" target="_blank" rel="noopener">allfeat.com</a></p>
    </div>

    <script>
      const RPC = "rpc";
      let id = 0;

      async function call(method, params = []) {
        const res = await fetch(RPC, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: ++id, method, params }),
        });
        const json = await res.json();
        if (json.error) throw new Error(json.error.message || method);
        return json.result;
      }

      const hexToInt = (h) => (typeof h === "string" && h.startsWith("0x") ? parseInt(h, 16) : Number(h));
      const $ = (x) => document.getElementById(x);

      function setStatus(state, text) {
        $("dot").className = "dot" + (state ? " " + state : "");
        $("statustext").textContent = text;
      }

      async function refresh() {
        try {
          const [chain, name, version, health, sync, peerId] = await Promise.all([
            call("system_chain"),
            call("system_name"),
            call("system_version"),
            call("system_health"),
            call("system_syncState"),
            call("system_localPeerId"),
          ]);

          $("chainline").textContent = name + " · " + chain;
          $("version").textContent = version;
          $("peerid").textContent = peerId;
          $("peers").textContent = health.peers;

          const current = hexToInt(sync.currentBlock);
          const highest = hexToInt(sync.highestBlock) || current;
          $("best").textContent = "#" + current.toLocaleString();

          const pct = highest > 0 ? Math.min(100, (current / highest) * 100) : 0;
          $("syncbar").style.width = pct.toFixed(2) + "%";

          if (health.isSyncing) {
            $("syncval").textContent =
              "Syncing — " + current.toLocaleString() + " / " + highest.toLocaleString() + " (" + pct.toFixed(1) + "%)";
            setStatus("", "Syncing the Melodie network…");
          } else {
            $("syncval").textContent = "In sync at #" + current.toLocaleString();
            setStatus("ok", "Synced and online");
          }
        } catch (e) {
          setStatus("err", "Node not reachable yet — it may still be starting.");
          $("syncval").textContent = "—";
        }
      }

      refresh();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
