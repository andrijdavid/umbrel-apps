version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: github-runner_runner_1
      APP_PORT: 8080

  runner:
    image: andrijdavid/umbrel-github-runner:1.0.2@sha256:5b8c9ec5bd97d1d405fee7951e1889b9a5c96d0b0aba1c425bd47305799fe395
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/data
