version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: github-runner_runner_1
      APP_PORT: 8080

  runner:
    image: ghcr.io/andrijdavid/github-runner-web:1.1.0@sha256:ec102e9bd2522c05bf6af08934c7694da2e5cdd8254354bfe1ff883dcd874a8d
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/data
