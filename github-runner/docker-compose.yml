version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: github-runner_runner_1
      APP_PORT: 8080

  runner:
    image: ghcr.io/andrijdavid/github-runner-web:1.1.1@sha256:92792d351d62da791c9bcb81cc0dfba4ddefc37024d9c6807348c06227030ceb
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/data
