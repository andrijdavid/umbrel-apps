version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: github-runner_runner_1
      APP_PORT: 8080

  runner:
    image: ghcr.io/andrijdavid/github-runner-web:1.1.2@sha256:e096adb0432c18a6f40fd7cc73d332cc830a1e14ce2fc66feaa59b086881160e
    restart: on-failure
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/data
